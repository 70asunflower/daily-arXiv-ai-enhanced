# arXiv Triage Keywords Configuration
# Each layer has a weight and list of case-insensitive keywords
# Matching scope: title + summary (abstract)
# If a keyword matches, its layer weight is added to the score

layers:
  # Priority ×3: Embodied AI × Infra/Architecture intersection papers
  # These are force-included regardless of score threshold
  intersection:
    weight: 3
    keywords:
      - "on-device inference"
      - "edge inference"
      - "edge accelerator"
      - "real-time inference"
      - "latency-bounded"
      - "VLA inference"
      - "VLA serving"
      - "robot SoC"
      - "embedded NPU"
      - "Jetson"
      - "model compression for robotics"
      - "action chunking inference"
      - "world model efficiency"
      - "hardware-software co-design"
      - "robot perception acceleration"
      - "on-robot deployment"
      - "robot accelerator"

  # Priority ×2: Core Architecture / Operator / Chip papers (employment ammunition)
  core_arch:
    weight: 2
    keywords:
      - "accelerator"
      - "NPU"
      - "GPU kernel"
      - "kernel fusion"
      - "fused kernel"
      - "Triton"
      - "CUDA"
      - "systolic"
      - "dataflow"
      - "PIM"
      - "processing-in-memory"
      - "sparsity"
      - "quantization"
      - "KV cache"
      - "FlashAttention"
      - "tensor parallelism"
      - "pipeline parallelism"
      - "MoE"
      - "chiplet"
      - "HBM"
      - "interconnect"
      - "attention kernel"
      - "GEMM"
      - "mixed precision"

  # Priority ×2: Core Embodied AI papers (advisor direction)
  core_embodied:
    weight: 2
    keywords:
      - "VLA"
      - "vision-language-action"
      - "manipulation"
      - "humanoid"
      - "diffusion policy"
      - "imitation learning"
      - "sim-to-real"
      - "world model"
      - "embodied"
      - "whole-body control"
      - "teleoperation"
      - "grasp synthesis"
      - "visual imitation"
      - "policy learning"

  # Priority ×1: Support MLSys papers (workload understanding context)
  support:
    weight: 1
    keywords:
      - "LLM serving"
      - "inference engine"
      - "scheduling"
      - "memory offloading"
      - "compiler"
      - "MLIR"
      - "TVM"
      - "training efficiency"
      - "distributed training"
      - "communication overlap"
      - "batch scheduling"
      - "request batching"

  # Priority -2: Noise / papers we actively want to suppress
  exclude:
    weight: -2
    keywords:
      - "pure theory"
      - "survey"
      - "social"
      - "recommendation system"
      - "NLP benchmark"
      - "medical imaging"

# Category bonuses
categories:
  core:
    - "cs.RO"
    - "cs.AR"
    - "cs.DC"
    weight: 1.0

# Venue / institution bonus (matching in comments or title)
venue_bonus: 0.3
venues:
  - "ISCA"
  - "MICRO"
  - "ASPLOS"
  - "MLSys"
  - "OSDI"
  - "CoRL"
  - "RSS"
  - "NeurIPS"
  - "ICML"
  - "ICLR"
  - "CVPR"
  - "ICCV"
  - "HotOS"
  - "SOSP"
  - "ATC"

# Reproducibility bonus
reproducibility_bonus: 0.5
reproducibility_indicators:
  - "github.com"
  - "code available"
  - "open-source"
  - "H100"
  - "A100"
  - "V100"
  - "FPGA"
  - "ASIC"
  - "RISC-V"
  - "benchmark"

# Filtering
top_n: 15
hard_score_threshold: 0

# Category tag mapping
category_tag_priority:
  - intersection
  - core_arch
  - core_embodied
  - support

# Display names for category tags
category_tag_names:
  intersection: "Intersection"
  core_arch: "Arch-Infra"
  core_embodied: "Embodied"
  support: "Support"
